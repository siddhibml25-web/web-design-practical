<!DOCTYPE html>
<html>
<head>
    <title>Seminar Registration</title>
</head>
<body>

    <h2>Seminar Registration Form</h2>

    <form>
        <fieldset>
            <legend>Participant Details</legend>

            First Name: <input type="text" placeholder="Enter first name"> <br><br>

            Last Name: <input type="text" placeholder="Enter last name"> <br><br>

            Phone: <input type="number" placeholder="Enter phone number"> <br><br>

            Email: <input type="email" placeholder="Enter email"> <br><br>

            Gender:
            <input type="radio" name="g"> Male
            <input type="radio" name="g"> Female
            <input type="radio" name="g"> Other <br><br>

            Age Group:
            <input type="radio" name="age"> Below 18
            <input type="radio" name="age"> 18-25
            <input type="radio" name="age"> Above 25 <br><br>

            Department:
            <select>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
                <option>Mechanical</option>
            </select> <br><br>

            Seminar Topic:
            <input type="checkbox"> AI & ML
            <input type="checkbox"> Cybersecurity
            <input type="checkbox"> Web Dev
            <input type="checkbox"> Cloud Computing <br><br>

            <input type="submit" value="Register">

        </fieldset>
    </form>

</body>
</html>
