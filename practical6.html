<!DOCTYPE html>
<html>
<head>
    <title>Scholarship Form</title>
</head>
<body>

    <h2>Scholarship Registration Form</h2>

    <form>
        <fieldset>
            <legend>Student Details</legend>

            Name: <input type="text" placeholder="Enter name"> <br><br>

            Email: <input type="email" placeholder="Enter email"> <br><br>

            Gender:
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female <br><br>

            Course:
            <select>
                <option>BCA</option>
                <option>B.Tech CSE</option>
                <option>MCA</option>
            </select> <br><br>

            Scholarship:
            <input type="checkbox"> Merit
            <input type="checkbox"> Sports
            <input type="checkbox"> Government <br><br>

            <input type="submit" value="Submit">

        </fieldset>
    </form>

</body>
</html>
